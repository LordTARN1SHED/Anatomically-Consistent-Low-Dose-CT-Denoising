seed: 42
output_dir: outputs/redcnn_lidc_medium

data:
  mode: dicom
  image_size: 256
  batch_size: 8
  num_workers: 4
  max_train_samples: 4096
  max_val_samples: 256

  clean_dir: null
  noisy_dir: null
  dicom_root: data/lidc_raw
  prepared_index_dir: data/lidc_index
  val_split_ratio: 0.1
  test_split_ratio: 0.1
  split_seed: 42
  min_slice_size: 64
  strict_ct_only: true

  hu_clip_min: -1000.0
  hu_clip_max: 1000.0

  lung_window_width: 1500.0
  lung_window_level: -600.0
  soft_window_width: 350.0
  soft_window_level: 50.0

  noise_model: signal_dependent_gaussian
  noise_sigma_min: 0.01
  noise_sigma_max: 0.06
  noise_alpha: 0.02

  edge_blur_sigma: 1.0
  edge_low_threshold: 40
  edge_high_threshold: 120

model:
  base_channels: 96
  kernel_size: 5

train:
  epochs: 6
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  grad_clip_norm: 1.0
  mixed_precision: true
  log_every_steps: 20
  save_every_steps: 300
  loss_type: mixed
  l1_weight: 0.1

eval:
  num_eval_samples: 256
  save_predictions: true
  compute_fid: false
  dataset_split: val
