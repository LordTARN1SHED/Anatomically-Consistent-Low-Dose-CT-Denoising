seed: 42
output_dir: outputs/mock_dicom_debug

data:
  mode: dicom
  image_size: 128
  batch_size: 2
  num_workers: 0
  max_train_samples: 8
  max_val_samples: 4

  clean_dir: null
  noisy_dir: null
  dicom_root: data/mock_lidc_raw
  prepared_index_dir: data/mock_lidc_index
  val_split_ratio: 0.1
  test_split_ratio: 0.1
  split_seed: 42
  min_slice_size: 64
  strict_ct_only: true

  hu_clip_min: -1000.0
  hu_clip_max: 1000.0

  lung_window_width: 1500.0
  lung_window_level: -600.0
  soft_window_width: 350.0
  soft_window_level: 50.0

  noise_model: signal_dependent_gaussian
  noise_sigma_min: 0.01
  noise_sigma_max: 0.04
  noise_alpha: 0.02

  edge_blur_sigma: 1.0
  edge_low_threshold: 30
  edge_high_threshold: 90

model:
  pretrained_model_name_or_path: null
  vae_subfolder: vae
  unet_subfolder: unet

  latent_scaling_factor: 1.0
  latent_channels: 4
  sample_size: 16
  use_tiny_models: true
  use_identity_autoencoder: true

  controlnet_conditioning_channels: 1
  enable_ldct_condition: true

  vae_frozen: true
  unet_frozen: false

train:
  epochs: 1
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  grad_clip_norm: 1.0
  mixed_precision: true
  gradient_accumulation_steps: 1
  save_every_steps: 20
  log_every_steps: 1
  num_train_timesteps: 1000
  train_condition_projector: false
  disable_edge_condition: false

  cache_latents: false
  latent_cache_dir: data/mock_lidc_latent_cache

eval:
  num_eval_samples: 4
  save_predictions: true
  compute_fid: false
  dataset_split: test
  num_inference_steps: 1
  inference_mode: direct_x0
  strength: 0.0
  controlnet_conditioning_scale: 1.0
  direct_timestep: 10
  output_blend_alpha: 0.8
  edge_adaptive_blend_strength: 0.4
  edge_adaptive_blur_sigma: 0.0
