seed: 42
output_dir: outputs/egldm_lidc_medium_no_edge_stable

data:
  mode: dicom
  image_size: 256
  batch_size: 4
  num_workers: 4
  max_train_samples: 4096
  max_val_samples: 256

  clean_dir: null
  noisy_dir: null
  dicom_root: data/lidc_raw
  prepared_index_dir: data/lidc_index
  val_split_ratio: 0.1
  test_split_ratio: 0.1
  split_seed: 42
  min_slice_size: 64
  strict_ct_only: true

  hu_clip_min: -1000.0
  hu_clip_max: 1000.0

  lung_window_width: 1500.0
  lung_window_level: -600.0
  soft_window_width: 350.0
  soft_window_level: 50.0

  noise_model: signal_dependent_gaussian
  noise_sigma_min: 0.01
  noise_sigma_max: 0.06
  noise_alpha: 0.02

  edge_blur_sigma: 1.0
  edge_low_threshold: 40
  edge_high_threshold: 120

model:
  pretrained_model_name_or_path: null
  vae_subfolder: vae
  unet_subfolder: unet

  latent_scaling_factor: 1.0
  latent_channels: 4
  sample_size: 32
  use_tiny_models: true
  use_identity_autoencoder: true

  controlnet_conditioning_channels: 1
  enable_ldct_condition: true

  vae_frozen: true
  unet_frozen: false

train:
  epochs: 4
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  grad_clip_norm: 1.0
  mixed_precision: true
  gradient_accumulation_steps: 1
  save_every_steps: 500
  log_every_steps: 20
  num_train_timesteps: 1000
  train_condition_projector: false
  disable_edge_condition: true

  cache_latents: true
  latent_cache_dir: data/lidc_latent_cache_medium

eval:
  num_eval_samples: 256
  save_predictions: true
  compute_fid: false
  dataset_split: val
  num_inference_steps: 1
  inference_mode: direct_x0
  strength: 0.0
  controlnet_conditioning_scale: 0.8
  direct_timestep: 20
  output_blend_alpha: 0.4
  edge_adaptive_blend_strength: 0.4
  edge_adaptive_blur_sigma: 0.0
