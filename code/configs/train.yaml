seed: 42
output_dir: outputs/egldm

data:
  mode: dicom
  image_size: 256
  batch_size: 4
  num_workers: 4
  max_train_samples: null
  max_val_samples: 200

  clean_dir: null
  noisy_dir: null
  dicom_root: data/lidc_raw
  prepared_index_dir: data/lidc_index
  val_split_ratio: 0.1
  test_split_ratio: 0.1
  split_seed: 42
  min_slice_size: 64
  strict_ct_only: true

  hu_clip_min: -1000.0
  hu_clip_max: 1000.0

  lung_window_width: 1500.0
  lung_window_level: -600.0
  soft_window_width: 350.0
  soft_window_level: 50.0

  noise_model: signal_dependent_gaussian
  noise_sigma_min: 0.01
  noise_sigma_max: 0.06
  noise_alpha: 0.02

  edge_blur_sigma: 1.0
  edge_low_threshold: 40
  edge_high_threshold: 120

model:
  # Replace with your medical-domain latent diffusion checkpoint if available.
  # If using SD weights, adapt cond strategy accordingly.
  pretrained_model_name_or_path: null
  vae_subfolder: vae
  unet_subfolder: unet

  latent_scaling_factor: 1.0
  latent_channels: 4
  sample_size: 32
  use_tiny_models: true
  use_identity_autoencoder: true

  controlnet_conditioning_channels: 1
  enable_ldct_condition: true

  vae_frozen: true
  unet_frozen: false

train:
  epochs: 20
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  grad_clip_norm: 1.0
  mixed_precision: true
  gradient_accumulation_steps: 1
  save_every_steps: 500
  log_every_steps: 20
  num_train_timesteps: 1000
  train_condition_projector: false
  disable_edge_condition: false

  cache_latents: true
  latent_cache_dir: data/latent_cache

eval:
  num_eval_samples: 200
  save_predictions: true
  compute_fid: true
  dataset_split: test
  num_inference_steps: 50
  inference_mode: img2img
  strength: 0.35
  controlnet_conditioning_scale: 1.0
